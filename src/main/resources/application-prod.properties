server.servlet.context-path=/
server.port=8080
server.host=shrinkly.net

shrinkly.base.url=${SHRINKLY_BASE_URL}

logging.level.org.springframework.web= DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.vinberts=DEBUG

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

spring.jmx.enabled=false

spring.thymeleaf.prefix=classpath:/templates/

spring.thymeleaf.cache=true

spring.devtools.add-properties=false


cloudflare.turnstile.site=${TURNSTILE_SITE_KEY}
shrinkly.shortcode.cipher-key=${SHORTCODE_CIPHER_KEY}
cloudflare.turnstile.secret=${TURNSTILE_SECRET_KEY}

#    5am every day
purge.cron.expression=0 0 5 * * ?

# Every 5 minutes
expired.cron.expression=0 0/5 * * * *

# Reconcile Redis click counters into the Postgres clicks column every 10 minutes
clicks.reconcile.cron.expression=0 0/10 * * * *

# ===============================
# DATABASE CONNECTION
# ===============================

spring.data.redis.database=0
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.timeout=60s
spring.data.redis.lettuce.shutdown-timeout=30s
#spring.data.redis.password=
#spring.data.redis.ssl.enabled=

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${POSTGRES_DB_CONNECTION_URL}
spring.datasource.username=${POSTGRES_DB_USER}
spring.datasource.password=${POSTGRES_DB_PASSWORD}

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Do not open a JDBC connection at startup to read database metadata;
# the dialect above is used instead (successor of the removed
# hibernate.temp.use_jdbc_metadata_defaults workaround)
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# uncomment this property to see the SQL statements generated
#logging.level.org.hibernate.SQL=DEBUG


################### JavaMail Configuration ##########################
support.email=noreply@shrinkly.net
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=465
spring.mail.protocol=smtps
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.transport.protocol=smtps
spring.mail.properties.mail.smtps.auth=true
spring.mail.properties.mail.smtps.starttls.enable=true
spring.mail.properties.mail.smtps.timeout=8000