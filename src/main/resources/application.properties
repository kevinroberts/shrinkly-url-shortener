server.servlet.context-path=/
server.port = 8080
server.host = localhost

shrinkly.base.url=https://shrinkly.net

logging.level.org.springframework.web= DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.vinberts=DEBUG

spring.thymeleaf.cache=false

# Preserve the pre-upgrade JSON wire format for date fields (timestamp arrays);
# Boot's Jackson auto-configuration would otherwise switch them to ISO-8601 strings
spring.jackson.datatype.datetime.write-dates-as-timestamps=true


cloudflare.turnstile.site=${TURNSTILE_SITE_KEY}
cloudflare.turnstile.secret=${TURNSTILE_SECRET_KEY}

# Secret key for the short-code permutation. Dev fallback keeps tests/local boot
# working; prod overrides this with a real secret (see application-prod.properties).
shrinkly.shortcode.cipher-key=${SHORTCODE_CIPHER_KEY:dev-insecure-default-key}


#    5am every day
purge.cron.expression=0 0 5 * * ?

# Every 5 minutes
expired.cron.expression=0 0/5 * * * *

# Reconcile Redis click counters into the Postgres clicks column every 10 minutes
clicks.reconcile.cron.expression=0 0/10 * * * *

# ===============================
# DATABASE CONNECTION
# ===============================

spring.data.redis.database=0
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60s
#spring.data.redis.password=
#spring.data.redis.ssl.enabled=

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/shrinkly
spring.datasource.username=${POSTGRES_DB_USER}
spring.datasource.password=${POSTGRES_DB_PASSWORD}

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Do not open a JDBC connection at startup to read database metadata;
# the dialect above is used instead (successor of the removed
# hibernate.temp.use_jdbc_metadata_defaults workaround)
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# uncomment this property to see the SQL statements generated
#logging.level.org.hibernate.SQL=DEBUG


################### JavaMail Configuration ##########################
# Local development mail server using mailhog // brew install mailhog
support.email=noreply@shrinkly.net
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.protocol=smtp
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.transport.protocol=smtp